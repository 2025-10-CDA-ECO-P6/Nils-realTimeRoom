services:
  # --- BACKEND (API) ---
  - type: web
    name: realtime-chat-api
    runtime: node
    rootDir: apps/api
    buildCommand: pnpm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production

  # --- FRONTEND (WEB + NGINX) ---
  - type: web
    name: realtime-chat-web
    runtime: docker
    rootDir: .
    dockerfilePath: apps/web/Dockerfile
    envVars:
      - key: PORT
        value: 80