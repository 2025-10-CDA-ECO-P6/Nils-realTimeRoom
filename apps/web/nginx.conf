server {
  listen 80;

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass https://realtime-chat-api-8xvt.onrender.com/;
    proxy_ssl_server_name on;
    proxy_set_header Host realtime-chat-api-8xvt.onrender.com;
  }

  location /socket.io/ {
    proxy_pass https://realtime-chat-api-8xvt.onrender.com;
    proxy_ssl_server_name on;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host realtime-chat-api-8xvt.onrender.com;
  }
}
