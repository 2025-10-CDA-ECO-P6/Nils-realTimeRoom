version : '3.8'

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    networks:
      - chat-network

  web:
    build: ./apps/web
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - chat-network

networks:
  chat-network:
    driver: bridge